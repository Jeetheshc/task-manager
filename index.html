<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Task Manager - Premium Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Outfit', sans-serif;
}

/* Beautiful moving gradient background to highlight the glass effect */
body {
    background: linear-gradient(-45deg, #4f46e5, #0ea5e9, #10b981, #3b82f6);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: #ffffff;
    min-height: 100vh;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    width: 100%;
    max-width: 1200px;
    margin: auto;
}

/* --------------------------------------
   GLASSMORPHISM DESIGN (The "Grand" Look)
--------------------------------------- */
.card {
    background: rgba(255, 255, 255, 0.1); /* Transparent White */
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 24px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    overflow: hidden;
}

.header {
    background: rgba(255, 255, 255, 0.05);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding: 30px;
    text-align: center;
    color: white;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 2px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: rgba(255, 255, 255, 0.1);
    color: #f8fafc;
    padding: 20px 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    font-size: 14px;
}

td {
    padding: 20px 15px;
    text-align: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    color: #f1f5f9;
    transition: background 0.3s;
}

/* Subtle hover effect on rows */
tr:hover td {
    background: rgba(255, 255, 255, 0.05);
}

td:first-child {
    text-align: left;
    font-weight: 600;
    font-size: 18px;
    padding-left: 40px;
}

.cell-wrapper {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

/* Glass Checkboxes */
input[type=checkbox] {
    appearance: none;
    width: 28px;
    height: 28px;
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: 0.3s ease;
}

input[type=checkbox]:checked {
    background: rgba(34, 197, 94, 0.85); /* Vibrant translucent green */
    border-color: rgba(34, 197, 94, 0.9);
    box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
}

input[type=checkbox]:checked:after {
    content: "✓";
    position: absolute;
    left: 7px;
    top: 1px;
    color: white;
    font-weight: bold;
    font-size: 16px;
}

/* Calendar Icon */
.date-icon {
    display: none;
    cursor: pointer;
    font-size: 20px;
    user-select: none;
    transition: transform 0.2s, filter 0.2s;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
}

.date-icon:hover {
    transform: scale(1.2) translateY(-2px);
}

input[type=checkbox]:checked + .date-icon {
    display: inline-block;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

.status {
    padding: 20px;
    text-align: center;
    font-weight: 600;
    font-size: 16px;
    color: #86efac;
    height: 60px; /* fixed height to prevent jumping */
}

/* --------------------------------------
   SMOOTH POPUP MODAL CSS
--------------------------------------- */
.popup-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: 0.4s ease;
    z-index: 1000;
}

.popup-overlay.active {
    opacity: 1;
    visibility: visible;
}

.popup-content {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 40px;
    border-radius: 24px;
    text-align: center;
    color: white;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    transform: translateY(30px) scale(0.9);
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    max-width: 350px;
    width: 90%;
}

.popup-overlay.active .popup-content {
    transform: translateY(0) scale(1);
}

.close-btn {
    position: absolute;
    top: 15px; right: 20px;
    font-size: 28px;
    cursor: pointer;
    color: rgba(255, 255, 255, 0.6);
    transition: 0.2s;
}

.close-btn:hover { color: white; }
.popup-icon { font-size: 50px; margin-bottom: 15px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); }
.popup-content h3 { margin-bottom: 10px; font-weight: 600; font-size: 24px; letter-spacing: 1px;}
.popup-content p { font-size: 16px; color: rgba(255, 255, 255, 0.9); line-height: 1.5; font-weight: 300;}

</style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            TASK MANAGER
        </div>
        <table>
            <tr>
                <th>TASK</th><th>JUNE</th><th>JULY</th><th>AUGUST</th><th>SEPTEMBER</th><th>OCTOBER</th><th>NOVEMBER</th><th>DECEMBER</th>
            </tr>
            <tr>
                <td>NPS</td>
                <td><div class="cell-wrapper"><input id="NPS_JUNE" type="checkbox" onchange="saveTask(this,'NPS','JUNE')"><span class="date-icon" id="date_NPS_JUNE" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_JULY" type="checkbox" onchange="saveTask(this,'NPS','JULY')"><span class="date-icon" id="date_NPS_JULY" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_AUGUST" type="checkbox" onchange="saveTask(this,'NPS','AUGUST')"><span class="date-icon" id="date_NPS_AUGUST" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_SEPTEMBER" type="checkbox" onchange="saveTask(this,'NPS','SEPTEMBER')"><span class="date-icon" id="date_NPS_SEPTEMBER" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_OCTOBER" type="checkbox" onchange="saveTask(this,'NPS','OCTOBER')"><span class="date-icon" id="date_NPS_OCTOBER" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_NOVEMBER" type="checkbox" onchange="saveTask(this,'NPS','NOVEMBER')"><span class="date-icon" id="date_NPS_NOVEMBER" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="NPS_DECEMBER" type="checkbox" onchange="saveTask(this,'NPS','DECEMBER')"><span class="date-icon" id="date_NPS_DECEMBER" onclick="showDate(this)">📅</span></div></td>
            </tr>
            <tr>
                <td>MEDISEP</td>
                <td><div class="cell-wrapper"><input id="MEDISEP_JUNE" type="checkbox" onchange="saveTask(this,'MEDISEP','JUNE')"><span class="date-icon" id="date_MEDISEP_JUNE" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_JULY" type="checkbox" onchange="saveTask(this,'MEDISEP','JULY')"><span class="date-icon" id="date_MEDISEP_JULY" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_AUGUST" type="checkbox" onchange="saveTask(this,'MEDISEP','AUGUST')"><span class="date-icon" id="date_MEDISEP_AUGUST" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_SEPTEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','SEPTEMBER')"><span class="date-icon" id="date_MEDISEP_SEPTEMBER" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_OCTOBER" type="checkbox" onchange="saveTask(this,'MEDISEP','OCTOBER')"><span class="date-icon" id="date_MEDISEP_OCTOBER" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_NOVEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','NOVEMBER')"><span class="date-icon" id="date_MEDISEP_NOVEMBER" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="MEDISEP_DECEMBER" type="checkbox" onchange="saveTask(this,'MEDISEP','DECEMBER')"><span class="date-icon" id="date_MEDISEP_DECEMBER" onclick="showDate(this)">📅</span></div></td>
            </tr>
            <tr>
                <td>KPEPF</td>
                <td><div class="cell-wrapper"><input id="KPEPF_JUNE" type="checkbox" onchange="saveTask(this,'KPEPF','JUNE')"><span class="date-icon" id="date_KPEPF_JUNE" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_JULY" type="checkbox" onchange="saveTask(this,'KPEPF','JULY')"><span class="date-icon" id="date_KPEPF_JULY" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_AUGUST" type="checkbox" onchange="saveTask(this,'KPEPF','AUGUST')"><span class="date-icon" id="date_KPEPF_AUGUST" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_SEPTEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','SEPTEMBER')"><span class="date-icon" id="date_KPEPF_SEPTEMBER" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_OCTOBER" type="checkbox" onchange="saveTask(this,'KPEPF','OCTOBER')"><span class="date-icon" id="date_KPEPF_OCTOBER" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_NOVEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','NOVEMBER')"><span class="date-icon" id="date_KPEPF_NOVEMBER" onclick="showDate(this)">📅</span></div></td>
                <td><div class="cell-wrapper"><input id="KPEPF_DECEMBER" type="checkbox" onchange="saveTask(this,'KPEPF','DECEMBER')"><span class="date-icon" id="date_KPEPF_DECEMBER" onclick="showDate(this)">📅</span></div></td>
            </tr>
        </table>
        
        <div class="status" id="status"></div>
    </div>
</div>

<div id="datePopup" class="popup-overlay" onclick="closePopup(event)">
    <div class="popup-content">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <div class="popup-icon">✨</div>
        <h3 id="popupTitle">Task Completed</h3>
        <p id="popupMessage">Loading date...</p>
    </div>
</div>

<form id="sheetForm" action="https://script.google.com/macros/s/AKfycbwL6wpOUEIXVO_i_1EHdiT3f-8Fpn2R4mu5omqHCZYV4dpAewFPyWjOg2l7aSnAxvXuuw/exec" method="POST" target="hiddenFrame">
    <input type="hidden" name="task" id="task">
    <input type="hidden" name="month" id="month">
    <input type="hidden" name="status" id="statusField">
    <input type="hidden" name="date" id="date">
</form>
<iframe name="hiddenFrame" style="display:none"></iframe>

<script>
// --- Task Saving Logic ---
function saveTask(box, task, month){
    const elementId = task + "_" + month;
    const icon = document.getElementById("date_" + elementId);
    
    // Formatting a cleaner date string
    const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    const timestamp = new Date().toLocaleDateString('en-US', options);

    document.getElementById("task").value = task;
    document.getElementById("month").value = month;
    document.getElementById("statusField").value = box.checked;
    document.getElementById("date").value = timestamp;

    if (box.checked && icon) {
        icon.setAttribute("data-date", timestamp);
    } else if (icon) {
        icon.removeAttribute("data-date");
    }

    document.getElementById("sheetForm").submit();

    const statusDiv = document.getElementById("status");
    statusDiv.innerHTML = "✓ Cloud Sync Successful";
    statusDiv.style.opacity = 1;
    
    setTimeout(() => {
        statusDiv.innerHTML = "";
    }, 2500);
}

// --- Data Loading Logic ---
function loadSavedData(data){
    data.forEach(row => {
        if(String(row.status).toUpperCase() == "TRUE"){
            const id = row.task + "_" + row.month;
            const cb = document.getElementById(id);
            const icon = document.getElementById("date_" + id);

            if(cb) cb.checked = true;
            if(icon && row.date) icon.setAttribute("data-date", row.date);
        }
    });
}

// --- Smooth Popup Logic ---
function showDate(icon) {
    const savedDate = icon.getAttribute("data-date");
    const popup = document.getElementById("datePopup");
    const title = document.getElementById("popupTitle");
    const message = document.getElementById("popupMessage");
    
    if(savedDate) {
        title.innerText = "Task Verified";
        message.innerHTML = `Completed securely on:<br><br><strong>${savedDate}</strong>`;
    } else {
        title.innerText = "Syncing...";
        message.innerText = "Data is still syncing with Google Sheets. Check back in a moment!";
    }
    
    popup.classList.add("active");
}

function closePopup(event) {
    // Close if the 'x' is clicked OR if the background overlay is clicked
    if (!event || event.target.id === 'datePopup' || event.target.className === 'close-btn') {
        document.getElementById("datePopup").classList.remove("active");
    }
}

// Inject Script to fetch data
const script = document.createElement("script");
script.src = "https://script.google.com/macros/s/AKfycbwL6wpOUEIXVO_i_1EHdiT3f-8Fpn2R4mu5omqHCZYV4dpAewFPyWjOg2l7aSnAxvXuuw/exec?callback=loadSavedData";
document.body.appendChild(script);
</script>

</body>
</html>
