<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard - Manjeshwar Grama Panchayat</title>

<!-- Enterprise & Professional Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Inter', sans-serif; 
}

body {
    background-color: #f1f5f9;
    background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
    background-size: 20px 20px;
    color: #0f172a; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
}

/* --------------------------------------
   OFFICIAL HEADER
--------------------------------------- */
.header-container {
    text-align: center;
    margin-bottom: 60px;
    background: white;
    padding: 40px 60px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(15, 23, 42, 0.05);
    border: 1px solid #e2e8f0;
    border-top: 5px solid #1e3a8a; /* Official Navy Blue accent */
    max-width: 800px;
    width: 100%;
}

.header-container h1 {
    font-size: 36px;
    font-weight: 800;
    color: #1e3a8a;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
}

.header-container h2 {
    font-size: 16px;
    font-weight: 500;
    color: #64748b;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* --------------------------------------
   INTERACTIVE CARDS GRID
--------------------------------------- */
.grid-container {
    display: flex;
    gap: 40px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 1000px;
    width: 100%;
}

.card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 20px;
    padding: 40px 30px;
    width: 320px;
    text-decoration: none; /* Removes underline from links */
    text-align: center;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
}

/* Hover Effects */
.card:hover {
    transform: translateY(-12px);
    box-shadow: 0 20px 40px rgba(30, 58, 138, 0.15);
    border-color: #bfdbfe;
}

/* Top colored bar inside the card */
.card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: #10b981; /* Green accent */
    transform: scaleX(0);
    transition: transform 0.4s ease;
}
.card:nth-child(2)::before {
    background: #f59e0b; /* Amber accent for CCTV */
}
.card:hover::before {
    transform: scaleX(1);
}

.card-icon {
    font-size: 55px;
    margin-bottom: 20px;
    background: #f1f5f9;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
    transition: background 0.3s;
}

.card:hover .card-icon {
    background: #e0e7ff;
}

.card-title {
    font-size: 22px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 12px;
}

.card-desc {
    font-size: 15px;
    color: #475569;
    line-height: 1.6;
}

/* --------------------------------------
   MOBILE RESPONSIVENESS
--------------------------------------- */
@media (max-width: 768px) {
    .header-container { padding: 30px 20px; }
    .header-container h1 { font-size: 28px; }
    .card { width: 100%; max-width: 350px; }
}
</style>
</head>
<body>

    <!-- Official Header -->
    <div class="header-container">
        <h1>Manjeshwar Grama Panchayat</h1>
        <h2>Central Management Portal</h2>
    </div>

    <!-- Navigation Cards -->
    <div class="grid-container">

        <!-- CARD 1: TASK MANAGER -->
        <a href="task.html" class="card">
            <div class="card-icon">📋</div>
            <h3 class="card-title">Task Manager</h3>
            <p class="card-desc">Track departmental deadlines, update completion statuses, and log official remarks securely.</p>
        </a>

        <!-- CARD 2: CCTV MANAGER -->
        <a href="camera.html" class="card">
            <div class="card-icon">📹</div>
            <h3 class="card-title">CCTV Manager</h3>
            <p class="card-desc">Monitor security camera statuses, maintenance logs, and surveillance system health.</p>
        </a>

    </div>

</body>
</html>
